btn.innerText=opt.text
btn.onclick=()=>answer(opt.effects)

});
}

function applyEffects(effects){
    for(const trait in effects){
        if(userTraits.hasOwnProperty(trait)){
            userTraits[trait] += effects[trait];
        }
    }
}

function answer(effects){
    applyEffects(effects);  
    current++;
    if(current < questions.length){
        showQuestion();
    }
    else{
        showResult();
    }
}

function normalizeTraits(){
    const normalized = {};
    const maxPossible = 12;
    for(const trait in userTraits){
        normalized[trait] = Math.min(10, (userTraits[trait] / maxPossible) * 10);
    }
    return normalized;
}

function cosineSimilarity(user, archetype){
    let dotProduct = 0;
    let userMagnitude = 0;
    let archetypeMagnitude = 0;
    const allTraits = new Set([
        ...Object.keys(user),
        ...Object.keys(archetype)]);
    allTraits.forEach(trait => {
        const u = user[trait] || 0;
        const a = archetype[trait] || 0;
        dotProduct += u * a;
        userMagnitude += u * u;
        archetypeMagnitude += a * a;
    });
    userMagnitude = Math.sqrt(userMagnitude);
    archetypeMagnitude = Math.sqrt(archetypeMagnitude);
    if(userMagnitude === 0 || archetypeMagnitude === 0){
        return 0;
    }
    return dotProduct / (userMagnitude * archetypeMagnitude);
}

function calculateArchetypeScores(){
    const normalizedUser = normalizeTraits();
    const scores = {};
    for(const archetype in archetypeProfiles){
        const similarity = cosineSimilarity(
            normalizedUser,
            archetypeProfiles[archetype]
        );
        scores[archetype] = similarity * 100;
    }
    return scores;
}

function determineFaction(archetype){
    for(const faction in factions){
        if(factions[faction].includes(archetype)){

        }
    }
    return "Independent";
}

function generateDynamicSummary(){

    }
    if(topTraits.includes("identitySeeking")){
        summary += "Your personality is heavily driven by existential self-discovery. ";
    }
    if(topTraits.includes("control")){
        summary += "You seek structure, predictability, and influence over uncertainty. ";
    }
    if(topTraits.includes("creativity")){
        summary += "Imagination and abstract thinking strongly shape your worldview. ";
    }
    if(topTraits.includes("attachment")){
        summary += "Relationships and emotional bonds deeply affect your decisions. ";
    }
    if(topTraits.includes("emotionalSuppression")){
        summary += "You tend to internalize emotions instead of openly expressing them. ";
    }
    if(topTraits.includes("visionaryThinking")){
        summary += "You are motivated by transformative ideas and long-term possibilities. ";
    }
    return summary;
}

function calculateFactionPercentages(archetypeScores){
    const factionScores = {};
    for(const faction in factions){
        factionScores[faction] = 0;
    }
    for(const archetype in archetypeScores){
        const score = archetypeScores[archetype];
        for(const faction in factions){
            if(factions[faction].includes(archetype)){
                factionScores[faction] += score;
            }
        }
    }
    const total =
        Object.values(factionScores)
        .reduce((a,b)=>a+b,0);
    for(const faction in factionScores){
        factionScores[faction] =
        Math.round(
            (factionScores[faction]/total)*100
        );
    }
    return factionScores;
}

function detectHybrid(topScore, secondScore){
    const difference = topScore - secondScore;
    if(difference <= 5){
        return true;
    }
    return false;
}
