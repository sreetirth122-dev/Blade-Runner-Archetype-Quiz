<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blade Runner Archetype Quiz</title>

<style>

*{box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background-image:url("cyberpunkbg.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:#eee;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
transparent,
transparent 2px,
rgba(0,0,0,0.25) 3px
);
pointer-events:none;
}

.page{
width:100%;
max-width:700px;
text-align:center;
}

.main-title{
font-size:clamp(2.5rem,6vw,5rem);
color:#ffffff;
margin-bottom:25px;
text-shadow:
0 0 5px #fff,
0 0 15px #bd00ff,
0 0 30px #00ffff,
0 0 60px #bd00ff;
}

.quiz-box{
background:linear-gradient(145deg,rgba(26,26,26,0.95),rgba(10,10,10,0.95));
padding:40px 30px;
border-radius:14px;
box-shadow:
0 0 25px rgba(0,255,255,0.4),
inset 0 0 25px rgba(255,79,216,0.15);
border:1px solid rgba(0,255,255,0.5);
position:relative;
}

.box-title{
font-size:1.4em;
margin-bottom:25px;
color:#ff4fd8;
text-transform:uppercase;
letter-spacing:1px;
text-shadow:0 0 8px rgba(255,79,216,0.8);
}

.question{
font-size:1.2rem;
margin-bottom:20px;
}

.options button{
width:100%;
padding:14px;
margin:10px 0;
border-radius:8px;
border:1px solid #00ffff;
background:linear-gradient(90deg,#111,#222);
color:#eee;
font-size:0.95rem;
cursor:pointer;
transition:all 0.2s ease;
}

.options button:hover{
background:linear-gradient(90deg,#00ffff,#ff4fd8);
color:#000;
box-shadow:0 0 15px rgba(0,255,255,0.9);
transform:scale(1.02);
}

.start-description{
font-size:0.95rem;
margin:20px 0;
color:#ccc;
}

.start-btn{
padding:14px 26px;
font-size:1rem;
border-radius:8px;
border:1px solid #ff3dcf;
background:#141414;
color:#ff3dcf;
cursor:pointer;
transition:all 0.2s;
}

.start-btn:hover{
background:#ff3dcf;
color:#000;
box-shadow:0 0 12px #ff3dcf;
}

/* RESULT CARD */

.result-card{
border:2px solid #00ffff;
padding:30px 25px;
border-radius:12px;
background:linear-gradient(160deg,rgba(5,5,10,0.95),rgba(20,20,30,0.95));
box-shadow:
0 0 25px rgba(0,255,255,0.6),
inset 0 0 20px rgba(255,79,216,0.2);
}

.result-title{
font-size:2.3em;
color:#00ffff;
margin-bottom:10px;
text-shadow:0 0 10px #00ffff,0 0 25px rgba(0,255,255,0.8);
}

.result-subtitle{
color:#ff4fd8;
margin-bottom:25px;
font-size:1.1em;
text-transform:uppercase;
letter-spacing:1px;
}

.data-row{
margin:12px 0;
padding:10px;
border-left:3px solid #ff4fd8;
background:rgba(255,255,255,0.03);
text-align:left;
}

.data-label{color:#00ffff;font-weight:bold}
.data-value{color:#eee}

.confidence-meter{margin-top:25px}

.meter-bar{
height:14px;
width:100%;
background:#111;
border:1px solid #00ffff;
border-radius:8px;
overflow:hidden;
margin-top:6px;
}

.meter-fill{
height:100%;
background:linear-gradient(90deg,#ff4fd8,#00ffff);
}

.restart-btn{
margin-top:30px;
padding:14px 30px;
background:linear-gradient(90deg,#00ffff,#ff4fd8);
border:none;
border-radius:10px;
font-size:1.1em;
cursor:pointer;
}

</style>
</head>

<body>

<div class="page">
<div class="main-title">WHO'S YOUR ARCHETYPE?</div>

<div class="quiz-box">

<div id="startScreen">

<div class="box-title">Enter the Nexus</div>

<div class="start-description">
In a world of artificial memories and synthetic lives,
which archetype defines you?
</div>

<button class="start-btn" onclick="startQuiz()">Start</button>

</div>

<div id="quizContent" style="display:none">

<div class="box-title">Choose what resonates with you</div>

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<div id="result-screen"></div>

</div>

</div>
</div>

<script>

/* ARCHETYPES */

const archetypes=[
"Disillusioned Hunter","Manufactured Being Seeking Humanity","Creator-God","Fallen Angel","Prophet of a New World",
"Hidden Chosen One","Mother of a New Species","Archivist of Truth","Corporate Enforcer","Broken Lawman",
"Mentor in Exile","Artificial Companion","Underground Resistance","Femme Fatale Enforcer","Memory Architect",
"Last Relic of the Past","Test Subject","Tyrannical Visionary","Lost Child","Ethical Scientist"
]

/* FACTIONS */

const paths={
Seekers:[
"Manufactured Being Seeking Humanity",
"Hidden Chosen One",
"Lost Child",
"Memory Architect",
"Artificial Companion"
],

"Makers & Masters":[
"Creator-God",
"Tyrannical Visionary",
"Corporate Enforcer",
"Femme Fatale Enforcer",
"Broken Lawman"
],

Rebels:[
"Fallen Angel",
"Prophet of a New World",
"Underground Resistance",
"Disillusioned Hunter",
"Mother of a New Species"
]
}

/* RESULTS */

const archetypeResults = {

"Manufactured Being Seeking Humanity": {
title:"The Manufactured Being Seeking Humanity",
traits:"Sensitive • Curious • Emotion-driven",
strengths:"Empathy, emotional intelligence",
shadow:"Identity confusion",
parallel:"Roy Batty / Rachael",
theme:"Becoming real through emotion"
},

"Hidden Chosen One": {
title:"The Hidden Chosen One",
traits:"Introspective • Sacrificial",
strengths:"Moral clarity",
shadow:"Self-doubt",
parallel:"K",
theme:"Meaning over origin"
},

"Lost Child": {
title:"The Lost Child",
traits:"Vulnerable • Gentle",
strengths:"Resilience",
shadow:"Loneliness",
parallel:"Replicant Child",
theme:"Searching for belonging"
},

"Memory Architect": {
title:"The Memory Architect",
traits:"Creative • Reflective",
strengths:"Imagination",
shadow:"Isolation",
parallel:"Ana Stelline",
theme:"Identity through memory"
},

"Artificial Companion": {
title:"The Artificial Companion",
traits:"Devoted • Loving",
strengths:"Emotional attunement",
shadow:"Dependency",
parallel:"Joi",
theme:"Love without agency"
},

"Creator-God": {
title:"The Creator-God",
traits:"Visionary • Grandiose",
strengths:"Innovation",
shadow:"Hubris",
parallel:"Tyrell / Wallace",
theme:"Playing god"
},

"Tyrannical Visionary": {
title:"The Tyrannical Visionary",
traits:"Fanatical • Dominant",
strengths:"Leadership",
shadow:"Cruelty",
parallel:"Wallace",
theme:"Progress without mercy"
},

"Corporate Enforcer": {
title:"The Corporate Enforcer",
traits:"Loyal • Controlled",
strengths:"Discipline",
shadow:"Moral blindness",
parallel:"Luv",
theme:"Obedience over humanity"
},

"Femme Fatale Enforcer": {
title:"The Femme Fatale Enforcer",
traits:"Seductive • Deadly",
strengths:"Precision",
shadow:"Manipulation",
parallel:"Zhora / Luv",
theme:"Weaponized charm"
},

"Broken Lawman": {
title:"The Broken Lawman",
traits:"World-weary • Cynical",
strengths:"Authority",
shadow:"Burnout",
parallel:"Joshi",
theme:"Order at a cost"
},

"Fallen Angel": {
title:"The Fallen Angel",
traits:"Charismatic • Tragic",
strengths:"Moral depth",
shadow:"Despair",
parallel:"Roy Batty",
theme:"Grace in rebellion"
},

"Prophet of a New World": {
title:"The Prophet of a New World",
traits:"Visionary • Idealistic",
strengths:"Inspiration",
shadow:"Fanaticism",
parallel:"Freysa",
theme:"Birthing a future"
},

"Underground Resistance": {
title:"The Underground Resistance",
traits:"Collective • Fierce",
strengths:"Unity",
shadow:"Extremism",
parallel:"Replicant Movement",
theme:"Freedom through rebellion"
},

"Disillusioned Hunter": {
title:"The Disillusioned Hunter",
traits:"Stoic • Conflicted",
strengths:"Endurance",
shadow:"Numbness",
parallel:"Deckard",
theme:"Humanity through duty"
},

"Mother of a New Species": {
title:"The Mother of a New Species",
traits:"Protective • Sacrificial",
strengths:"Love",
shadow:"Grief",
parallel:"Rachael",
theme:"Evolution through life"
},

"Archivist of Truth": {
title:"The Archivist of Truth",
traits:"Observant • Insightful",
strengths:"Memory preservation",
shadow:"Emotional distance",
parallel:"Gaff / Ana Stelline",
theme:"Guardians of hidden truths"
},

"Mentor in Exile": {
title:"The Mentor in Exile",
traits:"Wise • Detached",
strengths:"Experience",
shadow:"Isolation",
parallel:"Old Deckard",
theme:"Guidance through distance"
},

"Last Relic of the Past": {
title:"The Last Relic of the Past",
traits:"Nostalgic • Detached",
strengths:"Perspective",
shadow:"Obsolescence",
parallel:"Gaff",
theme:"Witness of fading worlds"
},

"Test Subject": {
title:"The Test Subject",
traits:"Controlled • Watched",
strengths:"Adaptability",
shadow:"Loss of autonomy",
parallel:"K Baseline Test",
theme:"Survival within systems"
},

"Ethical Scientist": {
title:"The Ethical Scientist",
traits:"Thoughtful • Responsible",
strengths:"Moral reasoning",
shadow:"Guilt",
parallel:"Ana Stelline",
theme:"Creation with conscience"
}

}

/* QUESTIONS */

const questions=[
{q:'You feel most alive when…',o:['Solving moral dilemmas','Creating something meaningful','Taking control','Protecting someone'],map:[19,14,17,6]},
{q:'People rely on you for…',o:['Empathy','Strategy','Reliability','Authority'],map:[1,2,0,9]},
{q:'Your biggest fear…',o:['Being insignificant','Losing control','Hurting others','Being alone'],map:[18,2,19,6]},
{q:'Chaos makes you…',o:['Enforce order','Search for meaning','Adapt quietly','Act boldly'],map:[9,7,16,3]},
{q:'You value most…',o:['Truth','Power','Connection','Freedom'],map:[7,17,12,13]},
{q:'Your ideal role…',o:['Explorer','Commander','Creator','Protector'],map:[5,2,14,6]},
{q:'Deep down you feel…',o:['Destined for something','Just a tool','Responsible for others','Guardian of truth'],map:[5,16,0,7]},
{q:'Your emotions are…',o:['Suppressed','Explosive','Gentle','Controlled'],map:[16,3,6,8]},
{q:'In a group you are…',o:['Leader','Strategist','Supporter','Outsider'],map:[17,2,11,10]},
{q:'Your greatest temptation…',o:['Power','Escape','Revenge','Recognition'],map:[17,10,3,2]},
{q:'You break rules when…',o:['Someone must be saved','Progress demands it','Truth must survive','It benefits you'],map:[6,2,7,8]},
{q:'Your inner voice says…',o:['Who am I?','Everything has purpose','Do your duty','Stay silent'],map:[1,4,9,7]},
{q:'You care more about…',o:['Legacy','Justice','Love','Order'],map:[2,19,11,9]},
{q:'Safety means…',o:['Control','Solitude','Trust','Predictability'],map:[17,10,6,16]},
{q:'You relate to…',o:['Revolutionaries','Lost children','God creators','Tired protectors'],map:[12,18,2,0]},
{q:'Your secret wish…',o:['Change the world','Be loved','Be remembered','Disappear'],map:[4,11,2,10]},
{q:'Stories about…',o:['Lost children','Fallen angels','Mad gods','Silent heroes'],map:[18,3,2,0]},
{q:'Love is…',o:['A glitch','Sacred','A tool','A distraction'],map:[11,6,8,10]},
{q:'You feel like…',o:['A weapon','A parent','A prophet','A ghost'],map:[13,6,4,15]},
{q:'Which line feels right?',o:['I want to be real','I did my duty','I will remake the world','I protected truth'],map:[1,0,17,7]}
]

const scores={}
archetypes.forEach(a=>scores[a]=0)

let current=0

function startQuiz(){
document.getElementById("startScreen").style.display="none"
document.getElementById("quizContent").style.display="block"
showQuestion()
}

function showQuestion(){
const q=questions[current]
document.getElementById("question").innerText=q.q
const options=document.getElementById("options")
options.innerHTML=""

q.o.forEach((opt,i)=>{
const btn=document.createElement("button")
btn.innerText=opt
btn.onclick=()=>answer(q.map[i])
options.appendChild(btn)
})
}

function answer(index){
scores[archetypes[index]]+=2
current++

if(current<questions.length){
showQuestion()
}else{
showResult()
}
}

function determineFaction(archetype){
for(const faction in paths){
if(paths[faction].includes(archetype)){
return faction
}
}
return "Independent"
}

function showResult(){

document.getElementById("question").style.display="none"
document.getElementById("options").style.display="none"

const result=document.getElementById("result-screen")
result.style.display="block"

const sorted=[...archetypes].sort((a,b)=>scores[b]-scores[a])
const top=sorted[0]

const data=archetypeResults[top] || {
title:top,
traits:"Unknown",
strengths:"Unknown",
shadow:"Unknown",
parallel:"Unknown",
theme:"Unknown"
}

const faction=determineFaction(top)

const confidenceScore=scores[sorted[0]]-scores[sorted[1]]

let confidence="Low"
let meter=40

if(confidenceScore>=6){
confidence="High"
meter=95
}
else if(confidenceScore>=3){
confidence="Medium"
meter=70
}

result.innerHTML=`

<div class="result-card">

<div class="result-subtitle">
Faction Alignment
</div>

<div class="result-title">
${faction}
</div>

<div class="result-subtitle">
Archetype Identity
</div>

<div class="result-title">
${data.title}
</div>

<div class="data-row">
<span class="data-label">Core Traits</span><br>
<span class="data-value">${data.traits}</span>
</div>

<div class="data-row">
<span class="data-label">Strengths</span><br>
<span class="data-value">${data.strengths}</span>
</div>

<div class="data-row">
<span class="data-label">Shadow Side</span><br>
<span class="data-value">${data.shadow}</span>
</div>

<div class="data-row">
<span class="data-label">Blade Runner Parallel</span><br>
<span class="data-value">${data.parallel}</span>
</div>

<div class="data-row">
<span class="data-label">Life Path Theme</span><br>
<span class="data-value">${data.theme}</span>
</div>

<div class="confidence-meter">

<span class="data-label">
Identity Stability: ${confidence}
</span>

<div class="meter-bar">
<div class="meter-fill" style="width:${meter}%"></div>
</div>

</div>

<button class="restart-btn" onclick="location.reload()">
Restart Analysis
</button>

</div>

`
}
</script>

</body>
</html>
